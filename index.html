<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>ADMIN V11 - QUẢN LÝ CHUYÊN NGHIỆP</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <style>
        :root { --blue: #0f3460; --pink: #e94560; --bg: #1a1a2e; }
        body { font-family: sans-serif; background: var(--bg); color: #fff; padding: 20px; margin: 0; }
        .box { background: #16213e; padding: 20px; border-radius: 12px; margin-bottom: 20px; border: 1px solid #333; }
        input, select, textarea { width: 100%; padding: 12px; margin: 10px 0; background: var(--blue); border: 1px solid #333; color: #fff; border-radius: 5px; box-sizing: border-box; }
        button { background: var(--pink); color: white; border: none; padding: 12px 20px; cursor: pointer; border-radius: 5px; font-weight: bold; }
        .grid-acc { display: grid; grid-template-columns: repeat(auto-fill, minmax(150px, 1fr)); gap: 10px; }
        .item-acc { background: var(--blue); padding: 10px; border-radius: 8px; text-align: center; border: 1px solid #444; }
        .item-acc img { width: 100%; height: 90px; object-fit: cover; border-radius: 5px; }
    </style>
</head>
<body>

    <h2>🛠 QUẢN LÝ DANH MỤC & SẢN PHẨM</h2>

    <div class="box">
        <h3>1. TẠO DANH MỤC (Ví dụ: FF, Proxy...)</h3>
        <input type="text" id="cat-name" placeholder="Tên mục...">
        <input type="file" id="cat-thumb" accept="image/*">
        <select id="cat-mode">
            <option value="modal">Khi ấn SP: Hiện bảng thanh toán luôn</option>
            <option value="page">Khi ấn SP: Nhảy trang xem Full ảnh</option>
        </select>
        <button onclick="upCat()">LƯU DANH MỤC</button>
    </div>

    <div class="box">
        <h3>2. QUẢN LÝ SẢN PHẨM TRONG MỤC</h3>
        <select id="sel-cat" onchange="loadA(this.value)"><option value="">-- Chọn mục để thêm SP --</option></select>
        
        <div id="acc-area" style="display:none; margin-top:20px; border-top:1px solid #333; padding-top:15px;">
            <button style="background:#0f9d58" onclick="document.getElementById('f-acc').style.display='block'">+ THÊM SẢN PHẨM MỚI</button>
            <div id="f-acc" style="display:none; margin:15px 0; padding:15px; background:#0b2239; border-radius:8px;">
                <input type="file" id="a-thumb" accept="image/*">
                <label style="font-size:12px;color:#ccc">Chọn ảnh mô tả (nhiều ảnh):</label>
                <input type="file" id="a-imgs" accept="image/*" multiple>
                <input type="number" id="a-price" placeholder="Giá bán...">
                <textarea id="a-info" placeholder="Mô tả chi tiết..."></textarea>
                <button onclick="upAcc()">XÁC NHẬN ĐĂNG</button>
            </div>
            <div class="grid-acc" id="list-a"></div>
        </div>
    </div>

<script>
    const config = { apiKey: "AIzaSyBk6R1TDZeAxh37JQLgL_6Wl0v8m8Sg0", databaseURL: "https://shopctv-61f96-default-rtdb.asia-southeast1.firebasedatabase.app/" };
    firebase.initializeApp(config); const db = firebase.database();

    const toB64 = f => new Promise(r => { const rd = new FileReader(); rd.readAsDataURL(f); rd.onload = () => r(rd.result); });

    // Load danh mục
    db.ref('categories').on('value', s => {
        const el = document.getElementById('sel-cat'); el.innerHTML = '<option value="">-- Chọn mục --</option>';
        s.forEach(c => el.innerHTML += `<option value="${c.key}">${c.val().name}</option>`);
    });

    async function upCat() {
        const n = document.getElementById('cat-name').value, f = document.getElementById('cat-thumb').files[0], m = document.getElementById('cat-mode').value;
        if(!n || !f) return alert("Thiếu ảnh hoặc tên!");
        const img = await toB64(f);
        db.ref('categories').push({ name: n, img: img, mode: m }).then(() => { alert("Đã tạo mục!"); location.reload(); });
    }

    function loadA(id) {
        if(!id) return document.getElementById('acc-area').style.display='none';
        document.getElementById('acc-area').style.display='block';
        db.ref('products/'+id).on('value', s => {
            const d = document.getElementById('list-a'); d.innerHTML = "";
            s.forEach(a => d.innerHTML += `<div class="item-acc"><img src="${a.val().thumb}"><p>${Number(a.val().price).toLocaleString()}đ</p><button onclick="delA('${id}','${a.key}')">Xóa</button></div>`);
        });
    }

    async function upAcc() {
        const id = document.getElementById('sel-cat').value, p = document.getElementById('a-price').value, info = document.getElementById('a-info').value, ft = document.getElementById('a-thumb').files[0], fs = document.getElementById('a-imgs').files;
        if(!ft || !p) return alert("Thiếu ảnh bìa hoặc giá!");
        let arr = []; for(let f of fs) arr.push(await toB64(f));
        const thumb = await toB64(ft);
        db.ref('products/'+id).push({ price: p, info: info, thumb: thumb, imgs: arr, status: 'ConHang' }).then(() => { alert("Thành công!"); document.getElementById('f-acc').style.display='none'; });
    }

    function delA(c, a) { if(confirm("Xóa?")) db.ref(`products/${c}/${a}`).remove(); }
</script>
</body>
</html>
